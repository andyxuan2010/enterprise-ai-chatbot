name: Terraform

on:
  push:
    branches:
      - main
      - dev
      - sandbox
      - sbx
  pull_request:
    branches:
      - main
      - dev
      - sandbox
      - sbx
  workflow_dispatch:
    inputs:
      ENABLE_GITHUB_APPLY:
        description: Run terraform apply after plan for this workflow run
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: terraform-${{ github.workflow }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validation-precheck:
    name: Check Required Secrets and Variables
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has_infracost_api_key: ${{ steps.check.outputs.has_infracost_api_key }}
      has_module_download_secret: ${{ steps.check.outputs.has_module_download_secret }}
      has_template_repo: ${{ steps.check.outputs.has_template_repo }}
      has_deploy_envs: ${{ steps.check.outputs.has_deploy_envs }}
      has_apply_inputs: ${{ steps.check.outputs.has_apply_inputs }}
      has_deploy_dev: ${{ steps.check.outputs.has_deploy_dev }}
      has_deploy_sandbox: ${{ steps.check.outputs.has_deploy_sandbox }}
      has_stage_publish_inputs: ${{ steps.check.outputs.has_stage_publish_inputs }}
      has_ado_dev_publish_inputs: ${{ steps.check.outputs.has_ado_dev_publish_inputs }}
      has_ado_sandbox_publish_inputs: ${{ steps.check.outputs.has_ado_sandbox_publish_inputs }}
      is_stage_repository: ${{ steps.check.outputs.is_stage_repository }}
    steps:
      - name: Evaluate required secrets and variables
        id: check
        shell: bash
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
          AZURE_ADO_PAT2: ${{ secrets.AZURE_ADO_PAT2 }}
          DEPLOY_DEV: ${{ vars.DEPLOY_DEV }}
          DEPLOY_SANDBOX: ${{ vars.DEPLOY_SANDBOX }}
          ENABLE_GITHUB_APPLY: ${{ vars.ENABLE_GITHUB_APPLY }}
          ENABLE_GITHUB_APPLY_MANUAL: ${{ github.event_name == 'workflow_dispatch' && inputs.ENABLE_GITHUB_APPLY == true && 'true' || 'false' }}
          STAGE_REPOSITORY: ${{ vars.STAGE_REPOSITORY }}
          STAGE_REPO_TOKEN: ${{ secrets.STAGE_REPO_TOKEN }}
          GH_TF_TEMPLATE_REPO: ${{ vars.GH_TF_TEMPLATE_REPO }}
          ADO_DEV_REPOSITORY: ${{ vars.ADO_DEV_REPOSITORY }}
          ADO_DEV_REPO_PAT: ${{ secrets.ADO_DEV_REPO_PAT }}
          PUBLISH_ADO_SANDBOX: ${{ vars.PUBLISH_ADO_SANDBOX }}
          ADO_SANDBOX_REPOSITORY: ${{ vars.ADO_SANDBOX_REPOSITORY }}
          ADO_SANDBOX_REPO_PAT: ${{ secrets.ADO_SANDBOX_REPO_PAT }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          write_check() {
            local input_type="$1"
            local input_name="$2"
            local input_value="$3"
            local blue="\033[34m"
            local yellow="\033[33m"
            local green="\033[32m"
            local red="\033[31m"
            local reset="\033[0m"

            if [[ -n "${input_value}" ]]; then
              printf -- "- %b%s%b %b%s%b: %bpresent%b\n" "${blue}" "${input_type}" "${reset}" "${yellow}" "${input_name}" "${reset}" "${green}" "${reset}"
            else
              printf -- "- %b%s%b %b%s%b: %bmissing%b\n" "${blue}" "${input_type}" "${reset}" "${yellow}" "${input_name}" "${reset}" "${red}" "${reset}"
            fi
          }

          enable_github_apply=""
          deploy_envs_display=""
          ado_sandbox_publish_display=""

          [[ "${ENABLE_GITHUB_APPLY,,}" == "true" || "${ENABLE_GITHUB_APPLY_MANUAL,,}" == "true" ]] && enable_github_apply="true"
          [[ "${DEPLOY_DEV,,}" == "true" || "${DEPLOY_SANDBOX,,}" == "true" ]] && deploy_envs_display="true"
          [[ "${PUBLISH_ADO_SANDBOX,,}" == "true" ]] && ado_sandbox_publish_display="true"

          echo "::group::Required secrets and variables"
          echo "Validate and plan require:"
          write_check "secret" "AZURE_ADO_PAT2" "${AZURE_ADO_PAT2}"
          write_check "variable" "GH_TF_TEMPLATE_REPO" "${GH_TF_TEMPLATE_REPO}"
          write_check "variable" "DEPLOY_DEV=true or DEPLOY_SANDBOX=true" "${deploy_envs_display}"
          echo "GitHub Environment secrets ARM_CLIENT_ID, ARM_CLIENT_SECRET, ARM_TENANT_ID, and ARM_SUBSCRIPTION_ID are checked inside each deploy environment job."
          echo ""
          echo "Apply requires:"
          write_check "variable/input" "ENABLE_GITHUB_APPLY=true" "${enable_github_apply}"
          write_check "secret" "AZURE_ADO_PAT2" "${AZURE_ADO_PAT2}"
          write_check "variable" "GH_TF_TEMPLATE_REPO" "${GH_TF_TEMPLATE_REPO}"
          write_check "variable" "DEPLOY_DEV=true or DEPLOY_SANDBOX=true" "${deploy_envs_display}"
          echo "GitHub Environment Azure secrets are checked inside the apply job."
          echo ""
          echo "Infracost requires:"
          write_check "secret" "INFRACOST_API_KEY" "${INFRACOST_API_KEY}"
          echo ""
          echo "Publish Github Stage Repo requires:"
          write_check "variable" "STAGE_REPOSITORY" "${STAGE_REPOSITORY}"
          write_check "secret" "STAGE_REPO_TOKEN" "${STAGE_REPO_TOKEN}"
          echo ""
          echo "Publish ADO Dev Repo requires:"
          write_check "variable" "ADO_DEV_REPOSITORY" "${ADO_DEV_REPOSITORY}"
          write_check "secret" "ADO_DEV_REPO_PAT" "${ADO_DEV_REPO_PAT}"
          echo ""
          echo "Publish ADO Sandbox Repo requires:"
          write_check "variable" "PUBLISH_ADO_SANDBOX=true" "${ado_sandbox_publish_display}"
          write_check "variable" "ADO_SANDBOX_REPOSITORY" "${ADO_SANDBOX_REPOSITORY}"
          write_check "secret" "ADO_SANDBOX_REPO_PAT" "${ADO_SANDBOX_REPO_PAT}"
          echo "::endgroup::"

          stage_repository_normalized=""
          if [[ -n "${STAGE_REPOSITORY}" ]]; then
            stage_repository_normalized="${STAGE_REPOSITORY#https://github.com/}"
          fi
          stage_repository_normalized="${stage_repository_normalized%.git}"
          stage_repository_normalized="${stage_repository_normalized#/}"
          stage_repository_normalized="${stage_repository_normalized%/}"

          if [[ -n "${stage_repository_normalized}" && "${CURRENT_REPOSITORY,,}" == "${stage_repository_normalized,,}" ]]; then
            echo "is_stage_repository=true" >> "${GITHUB_OUTPUT}"
            echo "Current repository matches the configured stage repository. Loop-prone jobs will be skipped for github-actions[bot]."
          else
            echo "is_stage_repository=false" >> "${GITHUB_OUTPUT}"
          fi

          [[ -n "${INFRACOST_API_KEY}" ]] && echo "has_infracost_api_key=true" >> "${GITHUB_OUTPUT}" || echo "has_infracost_api_key=false" >> "${GITHUB_OUTPUT}"

          if [[ -n "${AZURE_ADO_PAT2}" ]]; then
            echo "has_module_download_secret=true" >> "${GITHUB_OUTPUT}"
            has_module_download_secret="true"
          else
            echo "has_module_download_secret=false" >> "${GITHUB_OUTPUT}"
            has_module_download_secret="false"
            echo "Terraform module download secret is missing. Validate/plan jobs will be skipped."
          fi

          if [[ -n "${GH_TF_TEMPLATE_REPO}" ]]; then
            echo "has_template_repo=true" >> "${GITHUB_OUTPUT}"
            has_template_repo="true"
          else
            echo "has_template_repo=false" >> "${GITHUB_OUTPUT}"
            has_template_repo="false"
            echo "Template repo variable is missing. Validate/plan jobs will be skipped."
          fi

          [[ "${DEPLOY_DEV,,}" == "true" ]] && echo "has_deploy_dev=true" >> "${GITHUB_OUTPUT}" || echo "has_deploy_dev=false" >> "${GITHUB_OUTPUT}"
          [[ "${DEPLOY_SANDBOX,,}" == "true" ]] && echo "has_deploy_sandbox=true" >> "${GITHUB_OUTPUT}" || echo "has_deploy_sandbox=false" >> "${GITHUB_OUTPUT}"

          if [[ "${DEPLOY_DEV,,}" == "true" || "${DEPLOY_SANDBOX,,}" == "true" ]]; then
            echo "has_deploy_envs=true" >> "${GITHUB_OUTPUT}"
            has_deploy_envs="true"
          else
            echo "has_deploy_envs=false" >> "${GITHUB_OUTPUT}"
            has_deploy_envs="false"
            echo "No deploy environment variables are enabled. Validate/plan jobs will be skipped."
          fi

          if [[ "${enable_github_apply}" == "true" && "${has_module_download_secret}" == "true" && "${has_template_repo}" == "true" && "${has_deploy_envs}" == "true" ]]; then
            echo "has_apply_inputs=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_apply_inputs=false" >> "${GITHUB_OUTPUT}"
            echo "Apply is disabled, required inputs are missing, or no deploy environments are enabled. Apply jobs will be skipped."
          fi

          [[ -n "${STAGE_REPOSITORY}" && -n "${STAGE_REPO_TOKEN}" ]] && echo "has_stage_publish_inputs=true" >> "${GITHUB_OUTPUT}" || echo "has_stage_publish_inputs=false" >> "${GITHUB_OUTPUT}"
          [[ -n "${ADO_DEV_REPOSITORY}" && -n "${ADO_DEV_REPO_PAT}" ]] && echo "has_ado_dev_publish_inputs=true" >> "${GITHUB_OUTPUT}" || echo "has_ado_dev_publish_inputs=false" >> "${GITHUB_OUTPUT}"
          [[ "${PUBLISH_ADO_SANDBOX,,}" == "true" && -n "${ADO_SANDBOX_REPOSITORY}" && -n "${ADO_SANDBOX_REPO_PAT}" ]] && echo "has_ado_sandbox_publish_inputs=true" >> "${GITHUB_OUTPUT}" || echo "has_ado_sandbox_publish_inputs=false" >> "${GITHUB_OUTPUT}"

  plan_dev:
    name: Validate and Plan (dev)
    needs:
      - validation-precheck
    if: (needs.validation-precheck.outputs.is_stage_repository != 'true' || github.actor != 'github-actions[bot]') && needs.validation-precheck.outputs.has_module_download_secret == 'true' && needs.validation-precheck.outputs.has_template_repo == 'true' && needs.validation-precheck.outputs.has_deploy_dev == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: dev
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      DEPLOY_ENV: dev
      TERRAFORM_ROOT: terraform
      TERRAFORM_VAR_FILE: environments/dev/terraform.tfvars
      TERRAFORM_BACKEND_FILE: environments/dev/backend.hcl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout template repo
        shell: bash
        env:
          GH_TF_TEMPLATE_REPO: ${{ vars.GH_TF_TEMPLATE_REPO }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TF_TEMPLATE_REPO}" ]]; then
            echo "Missing required repository variable: GH_TF_TEMPLATE_REPO" >&2
            exit 1
          fi

          rm -rf ../template
          git clone --branch main --depth 1 "https://github.com/${GH_TF_TEMPLATE_REPO}.git" ../template

      - name: Validate Azure credentials
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${ARM_CLIENT_ID}" ]] || missing+=("ARM_CLIENT_ID")
          [[ -n "${ARM_CLIENT_SECRET}" ]] || missing+=("ARM_CLIENT_SECRET")
          [[ -n "${ARM_TENANT_ID}" ]] || missing+=("ARM_TENANT_ID")
          [[ -n "${ARM_SUBSCRIPTION_ID}" ]] || missing+=("ARM_SUBSCRIPTION_ID")

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub Environment secret(s) for dev: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Configure Git auth for Terraform module downloads
        shell: bash
        env:
          AZURE_ADO_PAT2: ${{ secrets.AZURE_ADO_PAT2 }}
        run: |
          set -euo pipefail

          if [[ -z "${AZURE_ADO_PAT2}" ]]; then
            echo "Missing required secret: AZURE_ADO_PAT2" >&2
            exit 1
          fi

          git config --global --unset-all http.https://dev.azure.com/.extraheader || true
          git config --global --unset-all url."https://ado:${AZURE_ADO_PAT2}@dev.azure.com/".insteadOf || true
          git config --global url."https://ado:${AZURE_ADO_PAT2}@dev.azure.com/".insteadOf "https://dev.azure.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare Terraform plugin cache
        shell: bash
        run: mkdir -p "${{ runner.temp }}/terraform-plugin-cache"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/terraform-plugin-cache
          key: terraform-providers-${{ runner.os }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-providers-${{ runner.os }}-

      - name: Terraform Init
        shell: bash
        working-directory: terraform
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/terraform-plugin-cache
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5 6 7 8; do
            if terraform init -input=false -no-color -reconfigure -backend-config="${TERRAFORM_BACKEND_FILE}"; then
              exit 0
            fi

            if [[ "${attempt}" -eq 8 ]]; then
              echo "terraform init failed after ${attempt} attempts" >&2
              exit 1
            fi

            rm -rf .terraform/providers
            sleep_seconds=$((attempt * 30))
            echo "terraform init failed; retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done

      - name: Terraform fmt check
        shell: bash
        working-directory: terraform
        run: |
          set -euo pipefail

          if ! terraform fmt -check -recursive; then
            echo "::warning::Terraform formatting drift detected. Running terraform fmt -recursive and continuing."
            terraform fmt -recursive || echo "::warning::terraform fmt -recursive failed; continuing so terraform validate can report any real syntax issues."
          fi

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform root harness test
        if: hashFiles('terraform/tests/root-plan.tftest.hcl') != ''
        working-directory: terraform
        run: terraform test -filter=tests/root-plan.tftest.hcl -no-color

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -input=false -no-color -var-file="${TERRAFORM_VAR_FILE}" -out=tfplan
        env:
          TF_VAR_environment: dev

      - name: Terraform plan summary
        shell: bash
        working-directory: terraform
        run: bash ../scripts/github/terraform-change-summary.sh tfplan "Terraform plan summary (dev)"

      - name: Setup Infracost
        if: needs.validation-precheck.outputs.has_infracost_api_key == 'true'
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost report
        if: needs.validation-precheck.outputs.has_infracost_api_key == 'true'
        shell: bash
        working-directory: terraform
        run: |
          set -euo pipefail

          terraform show -json tfplan > tfplan.json

          infracost breakdown \
            --path=tfplan.json \
            --format=json \
            --out-file=/tmp/infracost.json

          infracost output \
            --path=/tmp/infracost.json \
            --format=github-comment \
            --out-file=/tmp/infracost.md

          infracost output \
            --path=/tmp/infracost.json \
            --format=table \
            --show-skipped \
            --out-file=/tmp/infracost.txt

          {
            echo "## Infracost report"
            echo
            echo '```text'
            cat /tmp/infracost.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Comment Infracost on pull request
        if: github.event_name == 'pull_request' && needs.validation-precheck.outputs.has_infracost_api_key == 'true'
        shell: bash
        run: |
          set -euo pipefail

          infracost comment github \
            --path=/tmp/infracost.json \
            --repo="${GITHUB_REPOSITORY}" \
            --github-token="${{ github.token }}" \
            --pull-request="${{ github.event.pull_request.number }}" \
            --behavior=update

      - name: Upload Infracost artifacts
        if: needs.validation-precheck.outputs.has_infracost_api_key == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: infracost-report-dev-${{ github.run_id }}
          path: |
            /tmp/infracost.json
            /tmp/infracost.md
            /tmp/infracost.txt
          if-no-files-found: error

      - name: Upload plan artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev-${{ github.run_id }}
          path: terraform/tfplan
          if-no-files-found: error

  plan_sandbox:
    name: Validate and Plan (sandbox)
    needs:
      - validation-precheck
    if: (needs.validation-precheck.outputs.is_stage_repository != 'true' || github.actor != 'github-actions[bot]') && needs.validation-precheck.outputs.has_module_download_secret == 'true' && needs.validation-precheck.outputs.has_template_repo == 'true' && needs.validation-precheck.outputs.has_deploy_sandbox == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: sandbox
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      DEPLOY_ENV: sandbox
      TERRAFORM_ROOT: terraform
      TERRAFORM_VAR_FILE: environments/sandbox/terraform.tfvars
      TERRAFORM_BACKEND_FILE: environments/sandbox/backend.hcl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout template repo
        shell: bash
        env:
          GH_TF_TEMPLATE_REPO: ${{ vars.GH_TF_TEMPLATE_REPO }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TF_TEMPLATE_REPO}" ]]; then
            echo "Missing required repository variable: GH_TF_TEMPLATE_REPO" >&2
            exit 1
          fi

          rm -rf ../template
          git clone --branch main --depth 1 "https://github.com/${GH_TF_TEMPLATE_REPO}.git" ../template

      - name: Validate Azure credentials
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${ARM_CLIENT_ID}" ]] || missing+=("ARM_CLIENT_ID")
          [[ -n "${ARM_CLIENT_SECRET}" ]] || missing+=("ARM_CLIENT_SECRET")
          [[ -n "${ARM_TENANT_ID}" ]] || missing+=("ARM_TENANT_ID")
          [[ -n "${ARM_SUBSCRIPTION_ID}" ]] || missing+=("ARM_SUBSCRIPTION_ID")

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub Environment secret(s) for sandbox: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Configure Git auth for Terraform module downloads
        shell: bash
        env:
          AZURE_ADO_PAT2: ${{ secrets.AZURE_ADO_PAT2 }}
        run: |
          set -euo pipefail

          if [[ -z "${AZURE_ADO_PAT2}" ]]; then
            echo "Missing required secret: AZURE_ADO_PAT2" >&2
            exit 1
          fi

          git config --global --unset-all http.https://dev.azure.com/.extraheader || true
          git config --global --unset-all url."https://ado:${AZURE_ADO_PAT2}@dev.azure.com/".insteadOf || true
          git config --global url."https://ado:${AZURE_ADO_PAT2}@dev.azure.com/".insteadOf "https://dev.azure.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare Terraform plugin cache
        shell: bash
        run: mkdir -p "${{ runner.temp }}/terraform-plugin-cache"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/terraform-plugin-cache
          key: terraform-providers-${{ runner.os }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-providers-${{ runner.os }}-

      - name: Terraform Init
        shell: bash
        working-directory: terraform
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/terraform-plugin-cache
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5 6 7 8; do
            if terraform init -input=false -no-color -reconfigure -backend-config="${TERRAFORM_BACKEND_FILE}"; then
              exit 0
            fi

            if [[ "${attempt}" -eq 8 ]]; then
              echo "terraform init failed after ${attempt} attempts" >&2
              exit 1
            fi

            rm -rf .terraform/providers
            sleep_seconds=$((attempt * 30))
            echo "terraform init failed; retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done

      - name: Terraform fmt check
        shell: bash
        working-directory: terraform
        run: |
          set -euo pipefail

          if ! terraform fmt -check -recursive; then
            echo "::warning::Terraform formatting drift detected. Running terraform fmt -recursive and continuing."
            terraform fmt -recursive || echo "::warning::terraform fmt -recursive failed; continuing so terraform validate can report any real syntax issues."
          fi

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform root harness test
        if: hashFiles('terraform/tests/root-plan.tftest.hcl') != ''
        working-directory: terraform
        run: terraform test -filter=tests/root-plan.tftest.hcl -no-color

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -input=false -no-color -var-file="${TERRAFORM_VAR_FILE}" -out=tfplan
        env:
          TF_VAR_environment: sandbox

      - name: Terraform plan summary
        shell: bash
        working-directory: terraform
        run: bash ../scripts/github/terraform-change-summary.sh tfplan "Terraform plan summary (sandbox)"

      - name: Setup Infracost
        if: needs.validation-precheck.outputs.has_infracost_api_key == 'true'
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost report
        if: needs.validation-precheck.outputs.has_infracost_api_key == 'true'
        shell: bash
        working-directory: terraform
        run: |
          set -euo pipefail

          terraform show -json tfplan > tfplan.json

          infracost breakdown \
            --path=tfplan.json \
            --format=json \
            --out-file=/tmp/infracost.json

          infracost output \
            --path=/tmp/infracost.json \
            --format=github-comment \
            --out-file=/tmp/infracost.md

          infracost output \
            --path=/tmp/infracost.json \
            --format=table \
            --show-skipped \
            --out-file=/tmp/infracost.txt

          {
            echo "## Infracost report"
            echo
            echo '```text'
            cat /tmp/infracost.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Comment Infracost on pull request
        if: github.event_name == 'pull_request' && needs.validation-precheck.outputs.has_infracost_api_key == 'true'
        shell: bash
        run: |
          set -euo pipefail

          infracost comment github \
            --path=/tmp/infracost.json \
            --repo="${GITHUB_REPOSITORY}" \
            --github-token="${{ github.token }}" \
            --pull-request="${{ github.event.pull_request.number }}" \
            --behavior=update

      - name: Upload Infracost artifacts
        if: needs.validation-precheck.outputs.has_infracost_api_key == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: infracost-report-sandbox-${{ github.run_id }}
          path: |
            /tmp/infracost.json
            /tmp/infracost.md
            /tmp/infracost.txt
          if-no-files-found: error

      - name: Upload plan artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-sandbox-${{ github.run_id }}
          path: terraform/tfplan
          if-no-files-found: error

  apply_dev:
    name: Apply Dev
    if: github.event_name != 'pull_request' && needs.validation-precheck.outputs.has_apply_inputs == 'true' && needs.plan_dev.result == 'success'
    needs:
      - validation-precheck
      - plan_dev
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: dev
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      DEPLOY_ENV: dev
      TERRAFORM_BACKEND_FILE: environments/dev/backend.hcl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout template repo
        shell: bash
        env:
          GH_TF_TEMPLATE_REPO: ${{ vars.GH_TF_TEMPLATE_REPO }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TF_TEMPLATE_REPO}" ]]; then
            echo "Missing required repository variable: GH_TF_TEMPLATE_REPO" >&2
            exit 1
          fi

          rm -rf ../template
          git clone --branch main --depth 1 "https://github.com/${GH_TF_TEMPLATE_REPO}.git" ../template

      - name: Validate Azure credentials
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${ARM_CLIENT_ID}" ]] || missing+=("ARM_CLIENT_ID")
          [[ -n "${ARM_CLIENT_SECRET}" ]] || missing+=("ARM_CLIENT_SECRET")
          [[ -n "${ARM_TENANT_ID}" ]] || missing+=("ARM_TENANT_ID")
          [[ -n "${ARM_SUBSCRIPTION_ID}" ]] || missing+=("ARM_SUBSCRIPTION_ID")

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub Environment secret(s) for dev: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Configure Git auth for Terraform module downloads
        shell: bash
        env:
          AZURE_ADO_PAT2: ${{ secrets.AZURE_ADO_PAT2 }}
        run: |
          set -euo pipefail

          if [[ -z "${AZURE_ADO_PAT2}" ]]; then
            echo "Missing required secret: AZURE_ADO_PAT2" >&2
            exit 1
          fi

          git config --global --unset-all http.https://dev.azure.com/.extraheader || true
          git config --global --unset-all url."https://ado:${AZURE_ADO_PAT2}@dev.azure.com/".insteadOf || true
          git config --global url."https://ado:${AZURE_ADO_PAT2}@dev.azure.com/".insteadOf "https://dev.azure.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare Terraform plugin cache
        shell: bash
        run: mkdir -p "${{ runner.temp }}/terraform-plugin-cache"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/terraform-plugin-cache
          key: terraform-providers-${{ runner.os }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-providers-${{ runner.os }}-

      - name: Terraform Init
        shell: bash
        working-directory: terraform
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/terraform-plugin-cache
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5 6 7 8; do
            if terraform init -input=false -no-color -reconfigure -backend-config="${TERRAFORM_BACKEND_FILE}"; then
              exit 0
            fi

            if [[ "${attempt}" -eq 8 ]]; then
              echo "terraform init failed after ${attempt} attempts" >&2
              exit 1
            fi

            rm -rf .terraform/providers
            sleep_seconds=$((attempt * 30))
            echo "terraform init failed; retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-dev-${{ github.run_id }}
          path: terraform

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false -no-color tfplan
        env:
          TF_VAR_environment: dev

      - name: Terraform apply summary
        shell: bash
        working-directory: terraform
        run: bash ../scripts/github/terraform-change-summary.sh tfplan "Terraform apply summary (dev)"

