name: Terraform

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      apply:
        description: Run terraform apply after plan
        required: false
        default: false
        type: boolean
      apply_oidc:
        description: Run dev terraform apply with GitHub OIDC after plan
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validation-precheck:
    name: Validation Precheck
    runs-on: ubuntu-latest
    outputs:
      has_infracost_api_key: ${{ steps.check.outputs.has_infracost_api_key }}
      has_module_download_secret: ${{ steps.check.outputs.has_module_download_secret }}
      has_deploy_envs: ${{ steps.check.outputs.has_deploy_envs }}
      deploy_matrix: ${{ steps.check.outputs.deploy_matrix }}
    steps:
      - name: Check validation secrets
        id: check
        shell: bash
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
          AZURE_ADO_PAT2: ${{ secrets.AZURE_ADO_PAT2 }}
          DEPLOY_DEV: ${{ vars.DEPLOY_DEV }}
          DEPLOY_SANDBOX: ${{ vars.DEPLOY_SANDBOX }}
        run: |
          set -euo pipefail
          if [[ -n "${INFRACOST_API_KEY}" ]]; then
            echo "has_infracost_api_key=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_infracost_api_key=false" >> "${GITHUB_OUTPUT}"
          fi

          if [[ -n "${AZURE_ADO_PAT2}" ]]; then
            echo "has_module_download_secret=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_module_download_secret=false" >> "${GITHUB_OUTPUT}"
          fi

          matrix='{"include":['
          separator=''

          add_environment() {
            local deploy_env="$1"
            local flag="$2"

            if [[ "${flag,,}" == "true" ]]; then
              matrix="${matrix}${separator}{\"deploy_env\":\"${deploy_env}\",\"terraform_var_file\":\"environments/${deploy_env}/terraform.tfvars\",\"terraform_backend_file\":\"environments/${deploy_env}/backend.hcl\"}"
              separator=','
            fi
          }

          add_environment "dev" "${DEPLOY_DEV:-false}"
          add_environment "sandbox" "${DEPLOY_SANDBOX:-false}"

          matrix="${matrix}]}"

          if [[ -n "${separator}" ]]; then
            echo "has_deploy_envs=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_deploy_envs=false" >> "${GITHUB_OUTPUT}"
            matrix='{"include":[{"deploy_env":"dev","terraform_var_file":"environments/dev/terraform.tfvars","terraform_backend_file":"environments/dev/backend.hcl"}]}'
          fi

          echo "deploy_matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  validate-plan:
    name: Validate and Plan (${{ matrix.deploy_env }})
    needs: validation-precheck
    if: (github.repository != 'andyxuan2010/azure-template' || github.actor != 'github-actions[bot]') && needs.validation-precheck.outputs.has_module_download_secret == 'true' && needs.validation-precheck.outputs.has_deploy_envs == 'true'
    runs-on: ubuntu-latest
    environment: ${{ matrix.deploy_env }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validation-precheck.outputs.deploy_matrix) }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Azure credentials
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${ARM_CLIENT_ID}" ]] || missing+=("ARM_CLIENT_ID")
          [[ -n "${ARM_CLIENT_SECRET}" ]] || missing+=("ARM_CLIENT_SECRET")
          [[ -n "${ARM_TENANT_ID}" ]] || missing+=("ARM_TENANT_ID")
          [[ -n "${ARM_SUBSCRIPTION_ID}" ]] || missing+=("ARM_SUBSCRIPTION_ID")

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub Environment secret(s) for %s: %s\n' "${{ matrix.deploy_env }}" "${missing[*]}" >&2
            exit 1
          fi

      - name: Configure Git auth for Terraform module downloads
        shell: bash
        env:
          AZURE_ADO_PAT2: ${{ secrets.AZURE_ADO_PAT2 }}
        run: |
          set -euo pipefail

          if [[ -z "${AZURE_ADO_PAT2}" ]]; then
            echo "Missing required secret: AZURE_ADO_PAT2" >&2
            exit 1
          fi

          git config --global --unset-all http.https://dev.azure.com/.extraheader || true
          git config --global --unset-all url."https://ado:${AZURE_ADO_PAT2}@dev.azure.com/".insteadOf || true
          git config --global url."https://ado:${AZURE_ADO_PAT2}@dev.azure.com/".insteadOf "https://dev.azure.com/"

      - name: Resolve execution context
        id: context
        shell: bash
        run: |
          set -euo pipefail
          echo "deploy_env=${{ matrix.deploy_env }}" >> "${GITHUB_OUTPUT}"
          echo "terraform_var_file=${{ matrix.terraform_var_file }}" >> "${GITHUB_OUTPUT}"
          echo "terraform_backend_file=${{ matrix.terraform_backend_file }}" >> "${GITHUB_OUTPUT}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false -no-color -reconfigure -backend-config="${{ steps.context.outputs.terraform_backend_file }}"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform root harness test
        if: ${{ hashFiles('tests/root-plan.tftest.hcl') != '' }}
        run: terraform test -filter=tests/root-plan.tftest.hcl -no-color

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file="${{ steps.context.outputs.terraform_var_file }}" -out=tfplan
        env:
          TF_VAR_environment: ${{ steps.context.outputs.deploy_env }}

      - name: Terraform plan summary
        shell: bash
        run: bash ./scripts/github/terraform-change-summary.sh tfplan "Terraform plan summary (${{ steps.context.outputs.deploy_env }})"

      - name: Setup Infracost
        if: needs.validation-precheck.outputs.has_infracost_api_key == 'true'
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost report
        if: needs.validation-precheck.outputs.has_infracost_api_key == 'true'
        shell: bash
        run: |
          set -euo pipefail

          terraform show -json tfplan > tfplan.json

          infracost breakdown \
            --path=tfplan.json \
            --format=json \
            --out-file=/tmp/infracost.json

          infracost output \
            --path=/tmp/infracost.json \
            --format=github-comment \
            --out-file=/tmp/infracost.md

          infracost output \
            --path=/tmp/infracost.json \
            --format=table \
            --show-skipped \
            --out-file=/tmp/infracost.txt

          {
            echo "## Infracost report"
            echo
            echo '```text'
            cat /tmp/infracost.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Comment Infracost on pull request
        if: github.event_name == 'pull_request' && needs.validation-precheck.outputs.has_infracost_api_key == 'true'
        shell: bash
        run: |
          set -euo pipefail

          infracost comment github \
            --path=/tmp/infracost.json \
            --repo="${GITHUB_REPOSITORY}" \
            --github-token="${{ github.token }}" \
            --pull-request="${{ github.event.pull_request.number }}" \
            --behavior=update

      - name: Upload Infracost artifacts
        if: needs.validation-precheck.outputs.has_infracost_api_key == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: infracost-report-${{ steps.context.outputs.deploy_env }}-${{ github.run_id }}
          path: |
            /tmp/infracost.json
            /tmp/infracost.md
            /tmp/infracost.txt
          if-no-files-found: error

      - name: Upload plan artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ steps.context.outputs.deploy_env }}-${{ github.run_id }}
          path: tfplan
          if-no-files-found: error

  apply:
    name: Apply Selected Environment (${{ matrix.deploy_env }})
    if: github.event_name == 'workflow_dispatch' && inputs.apply == true && needs.validate-plan.result == 'success'
    needs:
      - validation-precheck
      - validate-plan
    runs-on: ubuntu-latest
    environment: ${{ matrix.deploy_env }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validation-precheck.outputs.deploy_matrix) }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Azure credentials
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${ARM_CLIENT_ID}" ]] || missing+=("ARM_CLIENT_ID")
          [[ -n "${ARM_CLIENT_SECRET}" ]] || missing+=("ARM_CLIENT_SECRET")
          [[ -n "${ARM_TENANT_ID}" ]] || missing+=("ARM_TENANT_ID")
          [[ -n "${ARM_SUBSCRIPTION_ID}" ]] || missing+=("ARM_SUBSCRIPTION_ID")

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub Environment secret(s) for %s: %s\n' "${{ matrix.deploy_env }}" "${missing[*]}" >&2
            exit 1
          fi

      - name: Configure Git auth for Terraform module downloads
        shell: bash
        env:
          AZURE_ADO_PAT2: ${{ secrets.AZURE_ADO_PAT2 }}
        run: |
          set -euo pipefail

          if [[ -z "${AZURE_ADO_PAT2}" ]]; then
            echo "Missing required secret: AZURE_ADO_PAT2" >&2
            exit 1
          fi

          git config --global --unset-all http.https://dev.azure.com/.extraheader || true
          git config --global --unset-all url."https://ado:${AZURE_ADO_PAT2}@dev.azure.com/".insteadOf || true
          git config --global url."https://ado:${AZURE_ADO_PAT2}@dev.azure.com/".insteadOf "https://dev.azure.com/"

      - name: Resolve execution context
        id: context
        shell: bash
        run: |
          set -euo pipefail
          echo "deploy_env=${{ matrix.deploy_env }}" >> "${GITHUB_OUTPUT}"
          echo "terraform_var_file=${{ matrix.terraform_var_file }}" >> "${GITHUB_OUTPUT}"
          echo "terraform_backend_file=${{ matrix.terraform_backend_file }}" >> "${GITHUB_OUTPUT}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false -no-color -reconfigure -backend-config="${{ steps.context.outputs.terraform_backend_file }}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ steps.context.outputs.deploy_env }}-${{ github.run_id }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -no-color tfplan
        env:
          TF_VAR_environment: ${{ steps.context.outputs.deploy_env }}

      - name: Terraform apply summary
        shell: bash
        run: bash ./scripts/github/terraform-change-summary.sh tfplan "Terraform apply summary (${{ steps.context.outputs.deploy_env }})"

  apply-dev-oidc:
    name: Apply Dev with OIDC
    if: github.event_name == 'workflow_dispatch' && inputs.apply_oidc == true && needs.validate-plan.result == 'success' && contains(needs.validation-precheck.outputs.deploy_matrix, '"deploy_env":"dev"')
    needs:
      - validation-precheck
      - validate-plan
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
      actions: read
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_OIDC_CLIENT_ID || secrets.AZURE_OIDC_CLIENT_ID || secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate OIDC configuration
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${ARM_CLIENT_ID}" ]] || missing+=("AZURE_OIDC_CLIENT_ID, AZURE_OIDC_CLIENT_ID secret, or ARM_CLIENT_ID")
          [[ -n "${ARM_TENANT_ID}" ]] || missing+=("ARM_TENANT_ID")
          [[ -n "${ARM_SUBSCRIPTION_ID}" ]] || missing+=("ARM_SUBSCRIPTION_ID")

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required OIDC configuration: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform Environment
        id: setup
        uses: ./.github/actions/setup-terraform
        with:
          environment_name: dev
          azure_ado_pat: ${{ secrets.AZURE_ADO_PAT2 }}
          use_oidc: 'true'

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-dev-${{ github.run_id }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -no-color tfplan
        env:
          TF_VAR_environment: ${{ steps.setup.outputs.deploy_env }}

      - name: Terraform apply summary
        shell: bash
        run: bash ./scripts/github/terraform-change-summary.sh tfplan "Terraform OIDC apply summary"

  create-git-tag:
    name: Create Git Tag
    if: github.event_name != 'pull_request' && needs.validate-plan.result == 'success'
    needs:
      - validate-plan
    outputs:
      release_tag: ${{ steps.semver.outputs.release_tag }}
      release_notes: ${{ steps.semver.outputs.release_notes }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create canonical GitHub release tag
        id: semver
        env:
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          release_tag_file="$(mktemp)"
          release_notes_file="$(mktemp)"

          bash scripts/github/create-release-tag.sh \
            --source-branch "${SOURCE_BRANCH}" \
            --source-sha "${SOURCE_SHA}" \
            --release-tag-file "${release_tag_file}" \
            --release-notes-file "${release_notes_file}"

          {
            echo "release_tag=$(cat "${release_tag_file}")"
            echo "release_notes<<EOF"
            cat "${release_notes_file}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  publish-stage-repo:
    name: Publish Stage Repo
    if: github.event_name != 'pull_request' && needs.validate-plan.result == 'success' && (needs.create-git-tag.result == 'success' || needs.create-git-tag.result == 'skipped')
    needs:
      - validate-plan
      - create-git-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Publish clean snapshot to stage repo
        env:
          STAGE_REPO_URL: ${{ secrets.STAGE_REPO_URL }}
          STAGE_REPO_TOKEN: ${{ secrets.STAGE_REPO_TOKEN }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ needs.create-git-tag.outputs.release_tag }}
          RELEASE_NOTES: ${{ needs.create-git-tag.outputs.release_notes }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${STAGE_REPO_URL}" ]]; then
            echo "Missing required secret: STAGE_REPO_URL" >&2
            exit 1
          fi

          if [[ -z "${STAGE_REPO_TOKEN}" ]]; then
            echo "Missing required secret: STAGE_REPO_TOKEN" >&2
            exit 1
          fi

          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          rsync -a \
            --exclude='.git' \
            "${GITHUB_WORKSPACE}/" "${workdir}/repo/"

          cd "${workdir}/repo"

          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${SOURCE_BRANCH}"
          git add .
          git commit -m "Stage snapshot from ${SOURCE_BRANCH}@${SOURCE_SHA}"

          if [[ -n "${RELEASE_TAG}" ]]; then
            release_notes="${RELEASE_NOTES:-}"
            if [[ -z "${release_notes}" ]]; then
              release_notes="- ${SOURCE_SHA}"
            fi

            tag_message="$(mktemp)"
            {
              echo "Release ${RELEASE_TAG} snapshot"
              echo
              echo "Source: ${SOURCE_BRANCH}@${SOURCE_SHA}"
              echo
              echo "Changes:"
              printf '%s\n' "${release_notes}"
            } > "${tag_message}"

            git tag -a "${RELEASE_TAG}" -F "${tag_message}"
          fi

          target_repo="${STAGE_REPO_URL#https://}"
          git remote add origin "https://x-access-token:${STAGE_REPO_TOKEN}@${target_repo}.git"
          git push --force origin "${SOURCE_BRANCH}"
          if [[ -n "${RELEASE_TAG}" ]]; then
            if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
              echo "Stage repo already has tag ${RELEASE_TAG}; leaving it unchanged."
            else
              git push origin "refs/tags/${RELEASE_TAG}"
            fi
          fi

  publish-ado-repo:
    name: Publish ADO Repo
    if: github.event_name != 'pull_request' && needs.validate-plan.result == 'success' && (needs.create-git-tag.result == 'success' || needs.create-git-tag.result == 'skipped')
    needs:
      - validate-plan
      - create-git-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror branch history to Azure DevOps repo
        env:
          ADO_REPO_URL: ${{ secrets.ADO_REPO_URL }}
          ADO_REPO_PAT: ${{ secrets.ADO_REPO_PAT }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ needs.create-git-tag.outputs.release_tag }}
          RELEASE_NOTES: ${{ needs.create-git-tag.outputs.release_notes }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${ADO_REPO_URL}" ]]; then
            echo "Missing required secret: ADO_REPO_URL" >&2
            exit 1
          fi

          if [[ -z "${ADO_REPO_PAT}" ]]; then
            echo "Missing required secret: ADO_REPO_PAT" >&2
            exit 1
          fi

          cd "${GITHUB_WORKSPACE}"

          target_repo="${ADO_REPO_URL#https://}"
          remote_name="ado"

          git remote remove "${remote_name}" >/dev/null 2>&1 || true
          git remote add "${remote_name}" "https://ado:${ADO_REPO_PAT}@${target_repo}"
          git fetch "${remote_name}" --prune
          git fetch --force --tags origin
          git push --force "${remote_name}" "refs/heads/${SOURCE_BRANCH}:refs/heads/${SOURCE_BRANCH}"

          if [[ -n "${RELEASE_TAG}" ]]; then
            origin_tag_ref="$(git ls-remote origin "refs/tags/${RELEASE_TAG}" | awk '{print $1}')"
            if [[ -z "${origin_tag_ref}" ]]; then
              echo "GitHub tag ${RELEASE_TAG} was not found on origin." >&2
              exit 1
            fi

            git tag -d "${RELEASE_TAG}" >/dev/null 2>&1 || true
            git fetch origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
            git push --force "${remote_name}" "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          fi
