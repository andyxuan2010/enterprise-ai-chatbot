  create-git-tag:
    name: Create Git Tag
    if: github.event_name != 'pull_request' && needs.apply_dev.result == 'success'
    needs:
      - apply_dev
    outputs:
      release_tag: ${{ steps.semver.outputs.release_tag }}
      release_notes: ${{ steps.semver.outputs.release_notes }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create canonical GitHub release tag
        id: semver
        env:
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          release_tag_file="$(mktemp)"
          release_notes_file="$(mktemp)"

          bash scripts/github/create-release-tag.sh \
            --source-branch "${SOURCE_BRANCH}" \
            --source-sha "${SOURCE_SHA}" \
            --release-tag-file "${release_tag_file}" \
            --release-notes-file "${release_notes_file}"

          {
            echo "release_tag=$(cat "${release_tag_file}")"
            echo "release_notes<<EOF"
            cat "${release_notes_file}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  publish-stage-repo:
    name: Publish Github Stage Repo
    if: always() && github.event_name != 'pull_request' && needs.validation-precheck.outputs.is_stage_repository != 'true' && needs.validation-precheck.outputs.has_stage_publish_inputs == 'true' && needs.apply_dev.result == 'success' && (needs.create-git-tag.result == 'success' || needs.create-git-tag.result == 'skipped')
    needs:
      - validation-precheck
      - apply_dev
      - create-git-tag
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Publish clean snapshot to stage repo
        env:
          STAGE_REPOSITORY: ${{ vars.STAGE_REPOSITORY }}
          STAGE_REPO_TOKEN: ${{ secrets.STAGE_REPO_TOKEN }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ needs.create-git-tag.outputs.release_tag }}
          RELEASE_NOTES: ${{ needs.create-git-tag.outputs.release_notes }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${STAGE_REPO_TOKEN}" ]]; then
            echo "Missing required secret: STAGE_REPO_TOKEN" >&2
            exit 1
          fi

          if [[ -n "${STAGE_REPOSITORY}" ]]; then
            target_repo="github.com/${STAGE_REPOSITORY%.git}"
          else
            echo "Missing required repository variable: STAGE_REPOSITORY" >&2
            exit 1
          fi

          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          rsync -a \
            --exclude='.git' \
            "${GITHUB_WORKSPACE}/" "${workdir}/repo/"

          cd "${workdir}/repo"

          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${SOURCE_BRANCH}"
          git add .
          git commit -m "Stage snapshot from ${SOURCE_BRANCH}@${SOURCE_SHA}"

          if [[ -n "${RELEASE_TAG}" ]]; then
            release_notes="${RELEASE_NOTES:-}"
            if [[ -z "${release_notes}" ]]; then
              release_notes="- ${SOURCE_SHA}"
            fi

            tag_message="$(mktemp)"
            {
              echo "Release ${RELEASE_TAG} snapshot"
              echo
              echo "Source: ${SOURCE_BRANCH}@${SOURCE_SHA}"
              echo
              echo "Changes:"
              printf '%s\n' "${release_notes}"
            } > "${tag_message}"

            git tag -a "${RELEASE_TAG}" -F "${tag_message}"
          fi

          git remote add origin "https://x-access-token:${STAGE_REPO_TOKEN}@${target_repo}.git"
          git push --force origin "${SOURCE_BRANCH}"
          if [[ -n "${RELEASE_TAG}" ]]; then
            if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
              echo "Stage repo already has tag ${RELEASE_TAG}; leaving it unchanged."
            else
              git push origin "refs/tags/${RELEASE_TAG}"
            fi
          fi

  publish-ado-dev-repo:
    name: Publish ADO Dev Repo
    if: always() && github.event_name != 'pull_request' && needs.validation-precheck.outputs.is_stage_repository != 'true' && needs.validation-precheck.outputs.has_ado_dev_publish_inputs == 'true' && needs.apply_dev.result == 'success' && (needs.create-git-tag.result == 'success' || needs.create-git-tag.result == 'skipped')
    needs:
      - validation-precheck
      - apply_dev
      - create-git-tag
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish Git history to Azure DevOps dev repo
        env:
          ADO_DEV_REPOSITORY: ${{ vars.ADO_DEV_REPOSITORY }}
          ADO_DEV_REPO_PAT: ${{ secrets.ADO_DEV_REPO_PAT }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ needs.create-git-tag.outputs.release_tag }}
          RELEASE_NOTES: ${{ needs.create-git-tag.outputs.release_notes }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${ADO_DEV_REPO_PAT}" ]]; then
            echo "Missing required secret: ADO_DEV_REPO_PAT" >&2
            exit 1
          fi

          if [[ -n "${ADO_DEV_REPOSITORY}" ]]; then
            target_repo="dev.azure.com/${ADO_DEV_REPOSITORY}"
          else
            echo "Missing required repository variable: ADO_DEV_REPOSITORY" >&2
            exit 1
          fi

          cd "${GITHUB_WORKSPACE}"

          remote_name="ado-dev"

          git remote remove "${remote_name}" >/dev/null 2>&1 || true
          git remote add "${remote_name}" "https://ado:${ADO_DEV_REPO_PAT}@${target_repo}"
          git fetch "${remote_name}" --prune
          git fetch --force --tags origin
          git push --force "${remote_name}" "refs/heads/${SOURCE_BRANCH}:refs/heads/${SOURCE_BRANCH}"

          if [[ -n "${RELEASE_TAG}" ]]; then
            origin_tag_ref="$(git ls-remote origin "refs/tags/${RELEASE_TAG}" | awk '{print $1}')"
            if [[ -z "${origin_tag_ref}" ]]; then
              echo "GitHub tag ${RELEASE_TAG} was not found on origin." >&2
              exit 1
            fi

            git tag -d "${RELEASE_TAG}" >/dev/null 2>&1 || true
            git fetch origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
            git push --force "${remote_name}" "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          fi

  publish-ado-sandbox-repo:
    name: Publish ADO Sandbox Repo
    if: always() && github.event_name != 'pull_request' && needs.validation-precheck.outputs.is_stage_repository != 'true' && needs.validation-precheck.outputs.has_ado_sandbox_publish_inputs == 'true' && needs.apply_sandbox.result == 'success' && (needs.create-git-tag.result == 'success' || needs.create-git-tag.result == 'skipped')
    needs:
