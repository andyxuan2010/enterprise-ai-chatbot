formatter: "markdown table"

content: |-
  # Terraform Reference

  This file is generated from the root Terraform module by `terraform-docs`. Update the Terraform files, then regenerate this document instead of editing it by hand.

  {{ .Content }}

output:
  file: ../docs/TERRAFORM_REFERENCE.md
  mode: replace

sort:
  enabled: true
  by: required

settings:
  anchor: false
  color: false
  default: true
  description: true
  escape: false
  hide-empty: false
  html: true
  indent: 2
  lockfile: true
  required: true
  sensitive: true
  type: true
