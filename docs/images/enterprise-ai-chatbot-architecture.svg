      .azure2 { fill: #43b7f2; }
      .green { fill: #238636; }
      .purple { fill: #6941c6; }
      .text { fill: #0f172a; font: 20px Arial, sans-serif; }
      .small { fill: #0f172a; font: 16px Arial, sans-serif; }
      .tiny { fill: #0f172a; font: 14px Arial, sans-serif; }
      .label { fill: #0f172a; font: 16px Arial, sans-serif; }
      .bold { font-weight: 700; }
      .line { stroke: #0969da; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #0969da; stroke-width: 2.3; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .green-line { stroke: #238636; stroke-width: 2.3; fill: none; stroke-dasharray: 8 6; marker-end: url(#green-arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0969da"/>
    </marker>
    <marker id="green-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#238636"/>
    </marker>
