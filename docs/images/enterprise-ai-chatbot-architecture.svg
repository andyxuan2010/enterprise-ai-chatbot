<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="940" viewBox="0 0 1672 940" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise AI Chatbot on Azure</title>
  <desc id="desc">Document-grounded RAG architecture showing browser, App Service, Entra ID, Azure AI Search, Azure OpenAI, Blob Storage, document sources, shared platform resources, and Terraform workload repo boundaries.</desc>
  <defs>
    <style>
      .bg { fill: #fbfdff; }
      .title { fill: #0b2d66; font: 700 54px Arial, sans-serif; }
      .subtitle { fill: #0969da; font: 700 30px Arial, sans-serif; }
      .note { fill: #082b5f; font: 18px Arial, sans-serif; }
      .box { fill: #fff; stroke: #0969da; stroke-width: 2; rx: 10; }
      .panel { fill: #fff; stroke: #6941c6; stroke-width: 1.6; rx: 12; }
      .shared { fill: #fbfff8; stroke: #238636; stroke-width: 1.5; stroke-dasharray: 7 4; rx: 12; }
      .shared-card { fill: #fff; stroke: #238636; stroke-width: 1.2; rx: 9; }
      .icon-circle { fill: #e8f1ff; stroke: #0969da; stroke-width: 1.6; }
